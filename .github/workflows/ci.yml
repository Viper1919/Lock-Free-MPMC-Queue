name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-gcc,    os: ubuntu-latest, cc: gcc,   cxx: g++ }
          - { name: linux-clang,  os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { name: macos-clang,  os: macos-latest,  cc: clang, cxx: clang++ }
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        env: { CC: '${{ matrix.cc }}', CXX: '${{ matrix.cxx }}' }
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    name: sanitize-${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: tsan, sanitize: thread }
          - { label: asan-ubsan, sanitize: 'address,undefined' }
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DLFQ_SANITIZE=${{ matrix.sanitize }}
        env: { CC: clang, CXX: clang++ }
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          # Sanitizers slow execution ~10x; shrink stress iterations to keep
          # interleaving coverage per wall-clock second, not per run.
          LFQ_STRESS_PER_PRODUCER: 20000
          # Phase 2 landed hazard pointers, so leak detection is back on:
          # LSan now enforces retired==freed for real. The still-shipping
          # leaky baseline is bracketed by scoped_lsan_disable in the
          # tests (leak_check.hpp) — a genuine hp_reclaimer leak fails.
          ASAN_OPTIONS: detect_leaks=1
